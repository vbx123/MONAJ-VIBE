<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MONAJ VIBE | موناج ڤايب - الطلبات الإلكترونية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6c5ce7;
      --primary-hover: #5b4cc4;
      --bg: #0f0c1b;
      --surface: #181528;
      --text: #f5f5fa;
      --text-muted: #a09cb0;
      --border: #2a2444;
      --success: #00b894;
      --warning: #ff7675;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 24px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 1px;
    }

    header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
    }

    .page {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .active-page {
      display: block;
    }

    /* Grid layouts for cards */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    @media (max-width: 400px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card-category, .card-template {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card-category:hover, .card-template:hover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.05);
      transform: translateY(-2px);
    }

    .card-category .icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: block;
    }

    .card-category h3, .card-template h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .card-category p {
      font-size: 11px;
      color: var(--text-muted);
    }

    .template-price {
      font-size: 13px;
      color: var(--primary);
      font-weight: bold;
      margin-top: 5px;
    }

    .template-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-action {
      flex: 1;
      padding: 6px 0;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-preview-link {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    
    .btn-preview-link:hover {
      background: rgba(108, 92, 231, 0.1);
    }

    .btn-order-trigger {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-order-trigger:hover {
      background: var(--primary-hover);
    }

    /* Form Fields Styling (not used now but keep minimal) */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    input[type="text"], input[type="tel"], textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .dynamic-field-box {
      background: rgba(255,255,255,0.01);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .btn-main {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-main:hover {
      background: var(--primary-hover);
    }

    .btn-main:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-back-nav {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 15px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-back-nav:hover {
      color: var(--text);
    }

    /* Success Page Styles - kept as reference but will not be used, still safe */
    .success-container {
      text-align: center;
      padding: 30px 10px;
    }

    .success-icon {
      font-size: 55px;
      color: var(--success);
      margin-bottom: 15px;
    }

    #displayOrderId {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(108, 92, 231, 0.1);
      border: 1px dashed var(--primary);
      padding: 10px 20px;
      border-radius: 8px;
      display: inline-block;
      margin: 15px 0;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .warning-box {
      background: rgba(255, 118, 117, 0.08);
      border: 1px solid rgba(255, 118, 117, 0.2);
      color: #ff9f9e;
      font-size: 12px;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: right;
      line-height: 1.6;
    }
    
    /* small utility */
    .text-muted {
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <header>
    <h1>MONAJ VIBE</h1>
    <p>أتمتة وتخصيص طلبات بطاقات الدعوة والتهنئة الرقمية الذكية</p>
  </header>

  <div class="container">

    <div id="homePage" class="page active-page">
      <h2>اختر القسم الرئيسي لطلبك:</h2>
      <div id="categoriesContainer" class="grid">
        </div>
    </div>

    <div id="categoryPage" class="page">
      <button class="btn-back-nav" onclick="navigateTo('homePage')">➔ العودة للأقسام</button>
      <h2 id="categoryPageTitle">القوالب المتوفرة</h2>
      <div id="templatesContainer" class="grid">
        </div>
    </div>

    <!-- تم إزالة صفحة orderFormPage نهائيًا، وتم استبدال الوظيفة بالواتساب المباشر -->
    <!-- إبقاء صفحة نجاح افتراضية ولكن لن تُستخدم، مع الاحتفاظ بها لتجنب أي أخطاء ولكن لن تظهر أبدًا-->
    <div id="successPage" class="page">
      <div class="success-container">
        <div class="success-icon">✓</div>
        <h2>تم استلام طلبك بنجاح!</h2>
        <p style="margin-top: 10px; color: var(--text-muted);">سيتم التواصل معك عبر الواتساب.</p>
        <button class="btn-main" style="margin-top: 25px;" onclick="window.location.reload()">تصفح من جديد</button>
      </div>
    </div>
  </div>

  <script>
    // رقم الواتساب المستهدف: +20 15 03296750 (بدون علامة + في الرابط ولكن يمكن إضافة 20)
    const TARGET_WHATSAPP_NUMBER = "201503296750";  // بدون +, فقط الأرقام
    
    // المتغيرات المساعدة
    let currentActiveCategory = "";

    document.addEventListener("DOMContentLoaded", () => {
      fetchCategories();
    });

    function navigateTo(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
      document.getElementById(pageId).classList.add('active-page');
    }

    // 1. جلب الأقسام من ملف categories.json
    function fetchCategories() {
      fetch('categories.json')
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById("categoriesContainer");
          container.innerHTML = "";
          data.categories.forEach(cat => {
            const div = document.createElement("div");
            div.className = "card-category";
            div.onclick = () => loadCategoryTemplates(cat.id, cat.file_data);
            div.innerHTML = `
              <span class="icon">${cat.icon}</span>
              <h3>${cat.name}</h3>
              <p>${cat.desc}</p>
            `;
            container.appendChild(div);
          });
        })
        .catch(err => {
          console.error("خطأ في جلب ملف الأقسام الرئيسي:", err);
          // عرض بيانات تجريبية في حال عدم وجود الملف (للتجربة)
          const container = document.getElementById("categoriesContainer");
          container.innerHTML = `<div class="text-muted" style="grid-column:span 2; text-align:center;">⚠️ لم يتم العثور على ملف الأقسام، تأكد من وجود categories.json</div>`;
        });
    }

    // 2. جلب القوالب الخاصة بقسم معين
    function loadCategoryTemplates(catId, jsonFileName) {
      currentActiveCategory = catId;
      fetch(jsonFileName)
        .then(res => res.json())
        .then(data => {
          navigateTo("categoryPage");
          document.getElementById("categoryPageTitle").innerHTML = `${data.category_icon || '📁'} ${data.category_title}`;
          
          const container = document.getElementById("templatesContainer");
          container.innerHTML = "";
          
          data.templates.forEach(tmpl => {
            const card = document.createElement("div");
            card.className = "card-template";
            
            // إنشاء بنية البطاقة مع زر الطلب الذي يفتح الواتساب مباشرة
            card.innerHTML = `
              <div class="template-thumb" style="font-size:28px; margin-bottom:5px;">${data.category_icon || '✨'}</div>
              <div class="template-body">
                <div>
                  <div class="template-title" style="font-weight:600; font-size:15px;">${tmpl.name}</div>
                  <div class="template-price">السعر: ${tmpl.price}</div>
                </div>
                <div class="template-actions">
                  <button class="btn-action btn-preview-link" data-preview-url="${tmpl.preview_url || '#'}">المعاينة</button>
                  <button class="btn-action btn-order-trigger" data-template-name="${tmpl.name.replace(/"/g, '&quot;')}" data-preview-url="${tmpl.preview_url || '#'}" data-price="${tmpl.price}">طلب القالب</button>
                </div>
              </div>
            `;
            
            // إضافة الأحداث
            const previewBtn = card.querySelector('.btn-preview-link');
            const orderBtn = card.querySelector('.btn-order-trigger');
            
            previewBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              const url = previewBtn.getAttribute('data-preview-url');
              openPreview(url);
            });
            
            orderBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              const templateName = orderBtn.getAttribute('data-template-name');
              const previewUrlRaw = orderBtn.getAttribute('data-preview-url');
              const price = orderBtn.getAttribute('data-price');
              redirectToWhatsApp(templateName, previewUrlRaw, price);
            });
            
            container.appendChild(card);
          });
        })
        .catch(err => {
          console.error("خطأ في جلب تفاصيل قوالب القسم:", err);
          const container = document.getElementById("templatesContainer");
          container.innerHTML = `<div class="text-muted" style="grid-column:span 2; text-align:center;">⚠️ فشل تحميل القوالب: ${jsonFileName}</div>`;
        });
    }

    // فتح معاينة القالب (يحاول فتح a6.html أو الرابط الموجود)
    function openPreview(url) {
      if (!url || url === "#") {
        alert("رابط المعاينة غير متاح حالياً لهذا القالب.");
        return;
      }
      // إذا كان الرابط a6.html أو أي رابط نسبي، سيفتح بشكل صحيح
      window.open(url, '_blank');
    }

    // وظيفة تحويل الطلب إلى واتساب مباشر بدون أي فورم أو تخزين في جوجل شيت
    function redirectToWhatsApp(templateName, previewUrl, price) {
      // تكوين النص المطلوب: باسم المنتج ورابط المعاينة
      // نص جاهز: "أريد طلب قالب: [اسم المنتج] - رابط المعاينة: [رابط المعاينة]"
      let message = `مرحباً، أرغب في طلب قالب "${templateName}"`;
      if (previewUrl && previewUrl !== "#") {
        // نستخدم الرابط الكامل: بما أن الموقع قد يكون على domain أو local, سنستخدم الرابط الحالي كأساس للوصول لـ a6.html
        let fullPreviewLink = previewUrl;
        // إذا كان الرابط هو "a6.html" مجرد اسم ملف أو مسار نسبي، نقوم بتحويله إلى رابط مطلق بناءً على origin الحالي
        if (!previewUrl.startsWith('http://') && !previewUrl.startsWith('https://')) {
          // إنشاء رابط مطلق استنادًا إلى موقع الصفحة الحالي
          const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
          fullPreviewLink = new URL(previewUrl, window.location.href).href;
        }
        message += ` - رابط المعاينة: ${fullPreviewLink}`;
      } else {
        message += ` (لا يتوفر رابط معاينة مباشر)`;
      }
      
      if (price && price !== "غير محدد") {
        message += ` - السعر: ${price}`;
      }
      
      message += ` - القسم: ${currentActiveCategory || "عام"}`;
      
      // ترميز النص للـ URL
      const encodedMessage = encodeURIComponent(message);
      
      // رابط واتساب مباشر للرقم المطلوب
      const whatsappUrl = `https://wa.me/${TARGET_WHATSAPP_NUMBER}?text=${encodedMessage}`;
      
      // فتح الواتساب في نافذة جديدة
      window.open(whatsappUrl, '_blank');
    }
    
    // تنبيه في حالة عدم تحميل ملفات JSON مع الحفاظ على تجربة جيدة
    window.addEventListener('error', (e) => {
      if(e.target.tagName === 'SCRIPT' && e.target.src) return;
      console.warn("تأكد من وجود ملفات الأقسام categories.json وملفات الأقسام الفرعية");
    });
  </script>
</body>
  </html>
