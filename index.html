<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MONAJ VIBE | موناج ڤايب - الطلبات الإلكترونية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6c5ce7;
      --primary-hover: #5b4cc4;
      --bg: #0f0c1b;
      --surface: #181528;
      --text: #f5f5fa;
      --text-muted: #a09cb0;
      --border: #2a2444;
      --success: #00b894;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 24px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 1px;
    }

    header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
    }

    .page {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .active-page {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    @media (max-width: 400px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card-category, .card-template {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card-category:hover, .card-template:hover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.05);
      transform: translateY(-2px);
    }

    .card-category .icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: block;
    }

    .card-category h3, .card-template h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .card-category p {
      font-size: 11px;
      color: var(--text-muted);
    }

    .template-price {
      font-size: 13px;
      color: var(--primary);
      font-weight: bold;
      margin-top: 5px;
    }

    .template-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-action {
      flex: 1;
      padding: 6px 0;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-preview-link {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    
    .btn-preview-link:hover {
      background: rgba(108, 92, 231, 0.1);
    }

    .btn-order-trigger {
      background: var(--primary);
      color: #fff;
    }
    
    .btn-order-trigger:hover {
      background: var(--primary-hover);
    }

    .btn-back-nav {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 15px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-back-nav:hover {
      color: var(--text);
    }

    .text-muted {
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <header>
    <h1>MONAJ VIBE</h1>
    <p>أتمتة وتخصيص طلبات بطاقات الدعوة والتهنئة الرقمية الذكية</p>
  </header>

  <div class="container">
    <div id="homePage" class="page active-page">
      <h2>اختر القسم الرئيسي لطلبك:</h2>
      <div id="categoriesContainer" class="grid"></div>
    </div>

    <div id="categoryPage" class="page">
      <button class="btn-back-nav" onclick="navigateTo('homePage')">➔ العودة للأقسام</button>
      <h2 id="categoryPageTitle">القوالب المتوفرة</h2>
      <div id="templatesContainer" class="grid"></div>
    </div>
  </div>

  <script>
    let currentActiveCategory = "";
    let whatsappNumber = "201503296750"; // الرقم الافتراضي

    // تحميل الإعدادات أولاً
    async function loadConfig() {
      try {
        const response = await fetch('config.json');
        const config = await response.json();
        if (config.whatsapp_number) {
          whatsappNumber = config.whatsapp_number;
        }
      } catch (err) {
        console.warn("لم يتم العثور على config.json، استخدام الرقم الافتراضي");
      }
    }

    function navigateTo(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
      document.getElementById(pageId).classList.add('active-page');
    }

    // جلب الأقسام من categories.json
    async function fetchCategories() {
      try {
        const response = await fetch('categories.json');
        const data = await response.json();
        const container = document.getElementById("categoriesContainer");
        container.innerHTML = "";
        
        data.categories.forEach(cat => {
          const div = document.createElement("div");
          div.className = "card-category";
          div.onclick = () => loadCategoryTemplates(cat.id, cat.file_data);
          div.innerHTML = `
            <span class="icon">${cat.icon}</span>
            <h3>${cat.name}</h3>
            <p>${cat.desc}</p>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("خطأ في جلب الأقسام:", err);
        document.getElementById("categoriesContainer").innerHTML = 
          `<div class="text-muted" style="grid-column:span 2; text-align:center;">⚠️ لم يتم العثور على ملف categories.json</div>`;
      }
    }

    // جلب القوالب من ملف JSON الخاص بالقسم
    async function loadCategoryTemplates(catId, jsonFileName) {
      currentActiveCategory = catId;
      try {
        const response = await fetch(jsonFileName);
        const data = await response.json();
        navigateTo("categoryPage");
        document.getElementById("categoryPageTitle").innerHTML = `${data.category_icon || '📁'} ${data.category_title}`;
        
        const container = document.getElementById("templatesContainer");
        container.innerHTML = "";
        
        data.templates.forEach(tmpl => {
          const card = document.createElement("div");
          card.className = "card-template";
          
          // تحديد رابط المعاينة من preview_file أو preview_url
          const previewFile = tmpl.preview_file || tmpl.preview_url || "#";
          
          card.innerHTML = `
            <div style="font-size:28px; margin-bottom:5px;">${data.category_icon || '✨'}</div>
            <div style="font-weight:600; font-size:15px;">${tmpl.name}</div>
            <div class="template-price">السعر: ${tmpl.price}</div>
            <div class="template-actions">
              <button class="btn-action btn-preview-link" data-preview="${previewFile}">المعاينة</button>
              <button class="btn-action btn-order-trigger" data-name="${tmpl.name.replace(/"/g, '&quot;')}" data-preview="${previewFile}" data-price="${tmpl.price}">طلب القالب</button>
            </div>
          `;
          
          const previewBtn = card.querySelector('.btn-preview-link');
          const orderBtn = card.querySelector('.btn-order-trigger');
          
          previewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const url = previewBtn.getAttribute('data-preview');
            openPreview(url);
          });
          
          orderBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const templateName = orderBtn.getAttribute('data-name');
            const previewUrl = orderBtn.getAttribute('data-preview');
            const price = orderBtn.getAttribute('data-price');
            redirectToWhatsApp(templateName, previewUrl, price);
          });
          
          container.appendChild(card);
        });
      } catch (err) {
        console.error("خطأ في جلب القوالب:", err);
        document.getElementById("templatesContainer").innerHTML = 
          `<div class="text-muted" style="grid-column:span 2; text-align:center;">⚠️ فشل تحميل القوالب: ${jsonFileName}</div>`;
      }
    }

    // فتح صفحة المعاينة (ملف HTML موجود في نفس المجلد)
    function openPreview(url) {
      if (!url || url === "#") {
        alert("رابط المعاينة غير متاح حالياً لهذا القالب.");
        return;
      }
      // فتح الملف مباشرة (سيفتح a6.html أو أي ملف html آخر)
      window.open(url, '_blank');
    }

    // فتح واتساب برسالة تحتوي اسم المنتج ورابط المعاينة
    function redirectToWhatsApp(templateName, previewUrl, price) {
      let message = `مرحباً، أرغب في طلب قالب "${templateName}"`;
      
      if (previewUrl && previewUrl !== "#") {
        // تحويل الرابط النسبي إلى رابط مطلق
        let fullPreviewLink = previewUrl;
        if (!previewUrl.startsWith('http://') && !previewUrl.startsWith('https://')) {
          fullPreviewLink = new URL(previewUrl, window.location.href).href;
        }
        message += ` - رابط المعاينة: ${fullPreviewLink}`;
      }
      
      if (price && price !== "غير محدد") {
        message += ` - السعر: ${price}`;
      }
      
      message += ` - القسم: ${currentActiveCategory || "عام"}`;
      
      const encodedMessage = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
      window.open(whatsappUrl, '_blank');
    }

    // بدء التشغيل
    async function init() {
      await loadConfig();
      await fetchCategories();
    }
    
    init();
  </script>
</body>
  </html>
